name: Build (Windows)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/ProformaCombiner.Wpf/ProformaCombiner.Wpf.csproj

      - name: Publish (single-file)
        run: |
          dotnet publish src/ProformaCombiner.Wpf/ProformaCombiner.Wpf.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProformaCombiner-win-x64
          path: src/ProformaCombiner.Wpf/bin/Release/net8.0-windows/win-x64/publish/
